<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Roosivelt Tupia - Portfolio{% endblock %}</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a192f 0%, #0d2b4e 50%, #1a3650 100%);
            color: white;
            min-height: 100vh;
        }
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
    </style>
</head>
<body class="bg-gray-900 text-white">

    <!-- Partículas de fondo -->
    <div id="particles-js"></div>

    <!-- Navegación -->
    <nav class="glass-nav backdrop-blur-md bg-white/10 fixed w-full z-50 border-b border-white/10">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
                RT
            </a>
            <div class="hidden md:flex space-x-8">
                <a href="#inicio" class="hover:text-blue-400 transition">Inicio</a>
                <a href="#proyectos" class="hover:text-blue-400 transition">Proyectos</a>
                <a href="#habilidades" class="hover:text-blue-400 transition">Habilidades</a>
                <a href="#contacto" class="hover:text-blue-400 transition">Contacto</a>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="pt-24 pb-12">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-black/30 backdrop-blur-md py-8 mt-12 border-t border-white/10">
        <div class="container mx-auto px-6 text-center text-gray-400">
            <p>&copy; 2024 Roosivelt Tupia Dipaz. Todos los derechos reservados.</p>
            <div class="flex justify-center space-x-6 mt-4">
                <a href="#" class="hover:text-white transition"><i class="fab fa-github fa-lg"></i></a>
                <a href="#" class="hover:text-white transition"><i class="fab fa-linkedin fa-lg"></i></a>
                <a href="#" class="hover:text-white transition"><i class="fab fa-twitter fa-lg"></i></a>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
