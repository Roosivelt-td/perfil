{% extends 'base.html' %}

{% block content %}
<div class="container mx-auto px-6 py-12">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-purple-400">
            Administrar Dominios
        </h1>
        <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-full transition transform hover:scale-105 shadow-lg shadow-blue-500/30 flex items-center gap-2">
            <i class="fas fa-plus"></i> Nuevo Dominio
        </button>
    </div>

    <!-- Filtros y Búsqueda -->
    <div class="glass-card p-4 rounded-xl mb-8 flex flex-wrap gap-4 items-center">
        <div class="relative flex-grow">
            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
            <input type="text" id="searchInput" placeholder="Buscar dominio..." class="w-full bg-gray-800/50 border border-gray-700 rounded-lg py-2 pl-10 pr-4 focus:outline-none focus:border-blue-500 transition text-white">
        </div>
        <select id="filterStatus" class="bg-gray-800/50 border border-gray-700 rounded-lg py-2 px-4 text-white focus:outline-none focus:border-blue-500">
            <option value="all">Todos los estados</option>
            <option value="activo">Activos</option>
            <option value="expirado">Expirados</option>
        </select>
    </div>

    <!-- Tabla de Dominios -->
    <div class="glass-card overflow-hidden rounded-xl">
        <div class="overflow-x-auto">
            <table class="w-full text-left text-gray-300">
                <thead class="bg-gray-800/50 text-xs uppercase text-gray-400">
                    <tr>
                        <th class="px-6 py-4 font-semibold">Dominio</th>
                        <th class="px-6 py-4 font-semibold">Registro</th>
                        <th class="px-6 py-4 font-semibold">Expiración</th>
                        <th class="px-6 py-4 font-semibold">Proveedor</th>
                        <th class="px-6 py-4 font-semibold text-center">Estado</th>
                        <th class="px-6 py-4 font-semibold text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="dominiosTableBody" class="divide-y divide-gray-700/50">
                    <!-- Filas dinámicas aquí -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal CRUD -->
<div id="crudModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/80 backdrop-blur-sm">
    <div class="glass-card w-full max-w-lg p-8 rounded-2xl border border-gray-700 shadow-2xl relative transform transition-all scale-100">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-white transition">
            <i class="fas fa-times fa-lg"></i>
        </button>
        <h2 id="modalTitle" class="text-2xl font-bold mb-6 text-white flex items-center gap-2">
            <i class="fas fa-globe text-blue-400"></i> <span id="modalTitleText">Nuevo Dominio</span>
        </h2>
        <form id="dominioForm" class="space-y-4">
            <input type="hidden" id="dominioId">
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Nombre del Dominio</label>
                <input type="text" id="nombre" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Enlace (Opcional)</label>
                <input type="url" id="link" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none transition">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Fecha Registro</label>
                    <input type="date" id="fecha_registro" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Fecha Expiración</label>
                    <input type="date" id="fecha_expiracion" required class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none transition">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Proveedor</label>
                    <input type="text" id="proveedor" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Estado</label>
                    <select id="estado" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none transition">
                        <option value="activo">Activo</option>
                        <option value="expirado">Expirado</option>
                        <option value="pendiente">Pendiente</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-400 mb-1">Notas</label>
                <textarea id="notas" rows="3" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white focus:border-blue-500 focus:outline-none transition"></textarea>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button type="button" onclick="closeModal()" class="px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition">Cancelar</button>
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold shadow-lg shadow-blue-500/30 transition transform hover:scale-105">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Lógica Frontend para Dominios
    let dominios = [];
    const modal = document.getElementById('crudModal');
    const form = document.getElementById('dominioForm');
    const tableBody = document.getElementById('dominiosTableBody');

    document.addEventListener('DOMContentLoaded', loadDominios);
    form.addEventListener('submit', handleFormSubmit);

    async function loadDominios() {
        try {
            const res = await fetch('/api/dominios');
            dominios = await res.json();
            renderTable(dominios);
        } catch (error) {
            console.error('Error cargando dominios:', error);
        }
    }

    function renderTable(data) {
        tableBody.innerHTML = '';
        if (data.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">No hay dominios registrados</td></tr>`;
            return;
        }

        data.forEach(d => {
            const statusColor = d.estado === 'activo' ? 'bg-green-500/20 text-green-400 border-green-500/30' :
                                d.estado === 'expirado' ? 'bg-red-500/20 text-red-400 border-red-500/30' :
                                'bg-yellow-500/20 text-yellow-400 border-yellow-500/30';

            const row = `
                <tr class="hover:bg-white/5 transition group">
                    <td class="px-6 py-4">
                        <div class="font-medium text-white">${d.nombre}</div>
                        ${d.link ? `<a href="${d.link}" target="_blank" class="text-xs text-blue-400 hover:underline flex items-center gap-1"><i class="fas fa-external-link-alt"></i> ${d.link}</a>` : ''}
                    </td>
                    <td class="px-6 py-4 text-sm">${d.fecha_registro}</td>
                    <td class="px-6 py-4 text-sm font-mono text-yellow-100/70">${d.fecha_expiracion}</td>
                    <td class="px-6 py-4 text-sm">${d.proveedor}</td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-3 py-1 rounded-full text-xs font-bold border ${statusColor} uppercase tracking-wider">
                            ${d.estado}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right space-x-2">
                        <button onclick='editDominio(${JSON.stringify(d)})' class="text-blue-400 hover:text-blue-300 p-2 rounded-full hover:bg-blue-500/10 transition" title="Editar">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="deleteDominio(${d.id})" class="text-red-400 hover:text-red-300 p-2 rounded-full hover:bg-red-500/10 transition" title="Eliminar">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    function openModal() {
        form.reset();
        document.getElementById('dominioId').value = '';
        document.getElementById('modalTitleText').innerText = 'Nuevo Dominio';
        modal.classList.remove('hidden');
    }

    function closeModal() {
        modal.classList.add('hidden');
    }

    function editDominio(d) {
        document.getElementById('dominioId').value = d.id;
        document.getElementById('nombre').value = d.nombre;
        document.getElementById('link').value = d.link || '';
        document.getElementById('fecha_registro').value = d.fecha_registro; // Formato YYYY-MM-DD
        document.getElementById('fecha_expiracion').value = d.fecha_expiracion;
        document.getElementById('proveedor').value = d.proveedor;
        document.getElementById('estado').value = d.estado;
        document.getElementById('notas').value = d.notas || '';
        document.getElementById('modalTitleText').innerText = 'Editar Dominio';
        modal.classList.remove('hidden');
    }

    async function deleteDominio(id) {
        if (!confirm('¿Estás seguro de eliminar este dominio?')) return;
        try {
            await fetch(`/api/dominios/${id}`, { method: 'DELETE' });
            loadDominios();
        } catch (error) {
            console.error('Error eliminando:', error);
        }
    }

    async function handleFormSubmit(e) {
        e.preventDefault();
        const id = document.getElementById('dominioId').value;
        const data = {
            nombre: document.getElementById('nombre').value,
            link: document.getElementById('link').value,
            fecha_registro: document.getElementById('fecha_registro').value,
            fecha_expiracion: document.getElementById('fecha_expiracion').value,
            proveedor: document.getElementById('proveedor').value,
            estado: document.getElementById('estado').value,
            notas: document.getElementById('notas').value
        };

        const url = id ? `/api/dominios/${id}` : '/api/dominios';
        const method = id ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                closeModal();
                loadDominios();
            } else {
                alert('Error al guardar');
            }
        } catch (error) {
            console.error('Error:', error);
        }
    }

    // Búsqueda en tiempo real
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = dominios.filter(d => d.nombre.toLowerCase().includes(term) || d.proveedor.toLowerCase().includes(term));
        renderTable(filtered);
    });
</script>
{% endblock %}
